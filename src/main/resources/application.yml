spring:
  application:
    name: education-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/education_platform}
      auto-index-creation: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# JWT
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging
logging:
  level:
    root: INFO
    com.education.platform: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
