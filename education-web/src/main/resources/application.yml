spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DB:schools}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Repair перед migrate робить FlywayMigrationStrategy у FlywayRepairBeforeMigrateConfig (надійніше за лише YAML).
    repair-on-migrate: false
    # Если правили V1/V2/V3 после применения к БД: один раз запусти с профилем "local" (см. application-local.yml).
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 18MB

server:
  # Railway/Render/Heroku: PORT з оточення; локально — 8080
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

logging:
  level:
    root: INFO
    com.education.web: DEBUG

# Посилання у листі-запрошенні (сторінка логіну фронтенду).
app:
  # CORS: прод — CORS_ALLOWED_ORIGINS=https://your-app.vercel.app (через кому). Dev: merge localhost + credentials.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    merge-localhost: ${CORS_MERGE_LOCALHOST:true}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:4200}
  # У Docker/Railway без volume користувач app часто не може створити /app/uploads — тоді задайте HOMEWORK_UPLOAD_DIR
  # або залиште дефолт: tmpdir JVM (завжди доступний для запису).
  homework-upload:
    dir: ${HOMEWORK_UPLOAD_DIR:${java.io.tmpdir}/education-homework}
  # Суперадмін для POST /api/auth/login (пароль лише на сервері, напр. Railway → SUPER_ADMIN_PASSWORD).
  # Якщо SUPER_ADMIN_PASSWORD порожній — запис не створюється і не оновлюється.
  super-admin:
    email: ${SUPER_ADMIN_EMAIL:superadmin@education.local}
    bootstrap-password: ${SUPER_ADMIN_PASSWORD:SuperAdmin!ChangeMe}
