spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

logging:
  level:
    root: WARN
    com.education.platform: INFO
    org.springframework.security: WARN
